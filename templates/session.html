<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F1 Session Replay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Barlow+Condensed:wght@300;400;600;700;900&family=Teko:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="/static/session.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo">
        <a href="/" style="display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit">
          <span>F1 <strong>Pit Wall</strong></span>
        </a>
      </div>
      <div id="session-meta" class="session-meta">Loading...</div>
    </div>
  </header>

  <main class="session-main">
    <div id="status" class="status hidden"></div>

    <section id="session-shell" class="session-shell hidden">
      <section class="session-grid">
        <article class="tracker-panel">
          <div class="panel-head">
            <div>
              <div class="panel-kicker">Driver Tracker</div>
              <h1 class="panel-title">Circuit Map</h1>
              <div class="panel-sub" id="map-sub">Interpolated live position replay</div>
            </div>
            <div class="tracker-meta">
              <span class="meta-chip" id="clock-label">00:00:00</span>
              <span class="meta-chip" id="lap-label">Lap --</span>
            </div>
          </div>

          <div class="track-stage" id="track-stage">
            <div id="flag-overlay" class="flag-overlay hidden"></div>
            <svg id="track-map" class="track-map" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid meet"></svg>
            <aside class="pit-board">
              <div class="pit-title">Pit Lane</div>
              <div id="pit-list" class="pit-list">
                <div class="pit-empty">No drivers in pit lane</div>
              </div>
            </aside>
            <div class="pit-lane-markers">
              <div class="pit-marker-entry">Pit Entry</div>
              <div class="pit-marker-exit">Pit Exit</div>
            </div>
          </div>
        </article>

        <article class="tower-panel">
          <div class="panel-head tower-head">
            <div>
              <div class="panel-kicker">Timing</div>
              <h2 class="panel-title" id="tower-title">Timing Board</h2>
              <div class="panel-sub" id="tower-sub">Updating by replay clock</div>
            </div>
            <div class="tower-status-wrap">
              <span class="flag-badge" id="flag-badge">GREEN</span>
            </div>
          </div>
          <div class="tower-header" id="tower-header"></div>
          <div class="tower-body" id="tower-body"></div>
        </article>
      </section>

      <section class="replay-ribbon" id="replay-ribbon">
        <div class="replay-ribbon-top">
          <div class="replay-title-wrap">
            <div class="replay-kicker">Replay</div>
            <h3 class="replay-title">Timeline</h3>
          </div>
          <div class="replay-live-meta" id="timeline-meta">00:00 / 00:00</div>
        </div>

        <div class="replay-controls-row">
          <button id="play-btn" type="button" class="replay-btn">Play</button>
          <div class="speed-cluster" id="speed-cluster">
            <button type="button" data-speed="1" class="speed-btn active">1x</button>
            <button type="button" data-speed="2" class="speed-btn">2x</button>
            <button type="button" data-speed="5" class="speed-btn">5x</button>
            <button type="button" data-speed="10" class="speed-btn">10x</button>
          </div>
          <label class="pit-toggle">
            <input id="pit-marker-toggle" type="checkbox" checked />
            Show pit markers
          </label>
        </div>

        <div class="timeline-wrap">
          <div id="timeline-markers" class="timeline-markers"></div>
          <input id="timeline" type="range" min="0" max="0" value="0" step="1" />
          <div class="timeline-scale" id="timeline-scale"></div>
        </div>
      </section>
    </section>
  </main>


  <script>
    const SESSION_KEY = Number("{{ session_key }}");
  </script>
  <script src="/static/session.js"></script>

</body>
</html>
